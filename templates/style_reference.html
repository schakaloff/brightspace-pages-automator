<!DOCTYPE html>
<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reference</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary:    #0E72ED;
            --mid:        #2D8CFF;
            --accent:     #00C6D7;
            --charcoal:   #50534C;
            --white:      #ffffff;
            --light-stone:#F8F9FA;
        }
        * { box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #eaf4ff, #dffcff);
            color: var(--charcoal);
            font-family: 'Poppins', sans-serif;
            margin: 0; padding: 0;
            display: flex; justify-content: center;
            min-height: 100vh;
        }
        .main-container {
            max-width: 1000px; width: 95%;
            margin: 2rem 0;
            background: var(--white);
            box-shadow: 0 20px 60px -10px rgba(14,114,237,0.2);
            border-radius: 24px; overflow: hidden;
        }
        .hero {
            background: linear-gradient(135deg, var(--primary) 0%, var(--mid) 50%, var(--accent) 100%);
            padding: 2.5rem 2.5rem;
            color: var(--white); position: relative;
        }
        .hero h1 {
            font-size: 2.2rem; font-weight: 800;
            margin: 0; line-height: 1.1;
            letter-spacing: -0.03em; text-transform: uppercase;
        }
        .hero-decoration {
            position: absolute; bottom: -15px; right: 30px;
            font-size: 6rem; font-weight: 900;
            opacity: 0.1; user-select: none;
        }
        .content-body { padding: 1.5rem 2rem; }
        .section-header {
            font-size: 1.2rem; color: var(--primary);
            margin: 0 0 0.6rem 0; font-weight: 700;
            border-bottom: 2px solid var(--light-stone);
            padding-bottom: 0.3rem;
        }
        .action-card {
            background: var(--white);
            border: 1px solid #eef0f2;
            padding: 1rem 1.2rem;
            border-radius: 12px;
            margin-bottom: 0.8rem;
            transition: all 0.3s ease;
        }
        .action-card:last-child { margin-bottom: 0; }
        .action-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 24px rgba(14,114,237,0.12);
        }
        ul { list-style: none; padding: 0; margin: 0; }
        li { margin-bottom: 0.4rem; }
        li:last-child { margin-bottom: 0; }
        a { color: var(--primary); text-decoration: none; font-weight: 600; font-size: 1rem; }
        a:hover { color: var(--accent); }
        .section-block { margin-bottom: 1.2rem; }
        .section-block:last-child { margin-bottom: 0; }
        @media (max-width: 768px) {
            .hero { padding: 2rem 1.5rem; }
            .hero h1 { font-size: 1.6rem; }
            .content-body { padding: 1rem 1.2rem; }
        }
    </style>
</head><body>
<div class="main-container">
    <header class="hero">
        <h1>Page Title</h1>
        <div class="hero-decoration">LABEL</div>
    </header>
    <div class="content-body">
        <div class="section-block">
            <h2 class="section-header">Section One</h2>
            <div class="action-card">Content here</div>
        </div>
        <div class="section-block">
            <h2 class="section-header">Section Two</h2>
            <div class="action-card">Content here</div>
        </div>
        <div class="section-block">
            <h2 class="section-header">Section Three</h2>
            <div class="action-card">Content here</div>
        </div>
    </div>
</div>
</body></html>
